version: 2

models:
  - name: dim_dates
    description: Calendar dimension, one row per day (2020-2030), generated in SQL.
    columns:
      - name: date_key
        description: Surrogate date key (YYYYMMDD integer).
        data_tests: [not_null, unique]
      - name: full_date
        data_tests: [not_null, unique]

  - name: dim_contributors
    description: Type 1 contributor profiles aggregated across commits and pull requests.
    columns:
      - name: contributor_key
        data_tests: [not_null, unique]
      - name: username
        data_tests: [not_null, unique]

  - name: dim_repositories
    description: SCD Type 2 repository dimension (one row per version) built on snap_repositories.
    columns:
      - name: repository_key
        description: Surrogate key, hash of repository_id + the snapshot version timestamp.
        data_tests: [not_null, unique]
      - name: repository_id
        data_tests: [not_null]
      - name: is_current
        data_tests: [not_null]
    data_tests:
      - dbt_utils.mutually_exclusive_ranges:
          arguments:
            lower_bound_column: valid_from
            upper_bound_column: valid_to
            partition_by: repository_id
            gaps: not_allowed

  - name: dim_labels
    description: Type 1 dimension of distinct issue/PR labels across all projects.
    columns:
      - name: label_key
        data_tests: [not_null, unique]
      - name: label_name
        data_tests: [not_null, unique]

  - name: fct_commits
    description: One row per commit. Repository resolved via the SCD2 half-open date range.
    columns:
      - name: commit_key
        description: Surrogate key, hash of repository + commit_sha.
        data_tests: [not_null, unique]
      - name: repository_key
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_repositories')
                field: repository_key
      - name: contributor_key
        description: Nullable - commits whose author has no GitHub login stay unattributed.
        data_tests:
          - relationships:
              arguments:
                to: ref('dim_contributors')
                field: contributor_key
      - name: date_key
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_dates')
                field: date_key
      - name: lines_added
        data_tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"
      - name: lines_deleted
        data_tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"

  - name: fct_pull_requests
    description: One row per pull request. Repository resolved via the SCD2 half-open range on the PR open date.
    columns:
      - name: pr_key
        description: Surrogate key, hash of repository + pr_number.
        data_tests: [not_null, unique]
      - name: repository_key
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_repositories')
                field: repository_key
      - name: author_key
        description: Nullable FK to dim_contributors.
        data_tests:
          - relationships:
              arguments:
                to: ref('dim_contributors')
                field: contributor_key
      - name: opened_date_key
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_dates')
                field: date_key
      - name: merged_date_key
        description: Nullable - only set for merged PRs.
        data_tests:
          - relationships:
              arguments:
                to: ref('dim_dates')
                field: date_key
      - name: review_count
        data_tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"

  - name: fct_issues
    description: One row per issue. Repository resolved via the SCD2 half-open range.
    columns:
      - name: issue_key
        description: Surrogate key, hash of repository + issue_number.
        data_tests: [not_null, unique]
      - name: repository_key
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_repositories')
                field: repository_key
      - name: author_key
        description: Nullable FK to dim_contributors.
        data_tests:
          - relationships:
              arguments:
                to: ref('dim_contributors')
                field: contributor_key
      - name: opened_date_key
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_dates')
                field: date_key
      - name: closed_date_key
        description: Nullable - only set for closed issues.
        data_tests:
          - relationships:
              arguments:
                to: ref('dim_dates')
                field: date_key
      - name: comment_count
        data_tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"

  - name: bridge_issue_labels
    description: Bridge for the issue<->label many-to-many. Grain - one row per issue/label.
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [issue_key, label_key]
    columns:
      - name: issue_key
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('fct_issues')
                field: issue_key
      - name: label_key
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_labels')
                field: label_key

  - name: fct_daily_downloads
    description: >
      One row per package per day (PyPI 'without_mirrors' downloads). `package` is a
      degenerate dimension - no package->repository mapping exists yet. Incremental
      (delete+insert on download_key).
    columns:
      - name: download_key
        description: Surrogate key, hash of package + download_date.
        data_tests: [not_null, unique]
      - name: package
        description: PyPI package name (degenerate dimension).
      - name: date_key
        description: FK to dim_dates (download day, YYYYMMDD).
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_dates')
                field: date_key
      - name: download_count
        description: Downloads recorded for the package that day.
        data_tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"

  - name: fct_contributor_activity_monthly
    description: >
      Aggregate fact, one row per contributor per month, pivoting the activity event
      stream into commit / PR / issue counts.
    columns:
      - name: activity_key
        description: Surrogate key, hash of contributor_key + event_month.
        data_tests: [not_null, unique]
      - name: contributor_key
        description: FK to dim_contributors.
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_contributors')
                field: contributor_key
      - name: month_date_key
        description: FK to dim_dates (first day of the activity month, YYYYMMDD).
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_dates')
                field: date_key
      - name: commits
        description: Commits authored that month.
        data_tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"
      - name: prs_opened
        description: Pull requests opened that month.
        data_tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"
      - name: prs_merged
        description: Pull requests merged that month.
        data_tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"
      - name: issues_opened
        description: Issues opened that month.
        data_tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"
      - name: issues_closed
        description: Issues closed that month.
        data_tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"
