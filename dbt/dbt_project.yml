name: 'repolytics'
version: '1.0.0'

config-version: 2
profile: 'repolytics'

require-dbt-version: [">=1.11.0", "<2.0.0"]

model-paths: ["models"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: target
clean-targets:
  - "target"
  - "dbt_packages"

models:
  repolytics:
    staging:
      +materialized: view
      +schema: staging
    intermediate:
      +materialized: view
      +schema: intermediate
    marts:
      +materialized: table
      +schema: marts
      +contract:
        enforced: true

seeds:
  repolytics:
    +schema: staging

snapshots:
  repolytics:
    +schema: snapshots
