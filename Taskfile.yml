# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: '3'

tasks:
  install:
    desc: Install all dependencies
    cmds:
      - uv sync --all-groups

  # ----- Quality: lint / format / test -----
  lint:
    desc: Run ruff linter (without fixes)
    cmds:
      - uv run ruff check .

  lint:fix:
    desc: Run ruff linter (applies fixes)
    cmds:
      - uv run ruff check --fix .

  format:
    desc: Run ruff formatter (applies fixes)
    cmds:
      - uv run ruff format .

  format:check:
    desc: Run ruff linter (without fixes)
    cmds:
      - uv run ruff format --check .

  test:
    desc: Run all tests (unit, integration, dag)
    cmds:
      - task: test:unit
      - task: test:integration
      - task: test:dag

  test:unit:
    desc: Run unit tests only
    cmds:
      - uv run pytest tests/unit

  test:integration:
    desc: Run integration tests only
    cmds:
      - uv run pytest tests/integration

  test:dag:
    desc: Run Airflow/Cosmos DAG tests
    deps: [dbt:manifest]
    cmds:
      - uv run --group dbt --group orchestration pytest tests/dag

  test:coverage:
    desc: Run unit + integration tests with coverage report
    cmds:
      - uv run pytest --cov --cov-report=xml --cov-report=term-missing

  ci:
    desc: Run full CI check locally (mirrors GitHub Actions, excludes Docker build)
    cmds:
      - task: lint
      - task: format:check
      - task: test:coverage
      - task: dbt:build:ci
      - task: test:dag

  # ----- dlt -----
  dlt:ingest:
    desc: Run the dlt pipeline (GitHub + PyPI) into the DuckDB raw schema
    cmds:
      - uv run python -m repolytics.ingestion.pipeline

  dlt:ingest:github:
    desc: Run only GitHub ingestion into the DuckDB raw schema
    cmds:
      - uv run python -c "from repolytics.ingestion.pipeline import run_github; run_github()"

  dlt:ingest:pypi:
    desc: Run only PyPI ingestion into the DuckDB raw schema
    cmds:
      - uv run python -c "from repolytics.ingestion.pipeline import run_pypi; run_pypi()"

  # ----- dbt -----
  dbt:seed:
    desc: Load CSV seeds into the warehouse
    dir: dbt
    cmds:
      - uv run --group dbt dbt seed

  dbt:deps:
    desc: Install dbt packages
    dir: dbt
    cmds:
      - uv run --group dbt dbt deps

  dbt:compile:
    desc: Compile dbt models (validate SQL without executing)
    dir: dbt
    cmds:
      - uv run --group dbt dbt compile

  dbt:manifest:
    desc: Generate target/manifest.json for Cosmos (DBT_MANIFEST load mode)
    dir: dbt
    cmds:
      - uv run --group dbt dbt parse

  dbt:run:
    desc: Run dbt models
    dir: dbt
    cmds:
      - uv run --group dbt dbt run

  dbt:test:
    desc: Run dbt tests
    dir: dbt
    cmds:
      - uv run --group dbt dbt test

  dbt:build:
    desc: Run dbt models and tests
    dir: dbt
    cmds:
      - uv run --group dbt dbt build

  dbt:build:ci:
    desc: Seed raw from fixtures and run dbt build against a throwaway DuckDB (mirrors CI)
    env:
      DUCKDB_PATH: /tmp/repolytics-ci.duckdb
    cmds:
      - rm -f "$DUCKDB_PATH"
      - uv run python -m tests.support.warehouse
      - cd dbt && uv run --group dbt dbt deps && uv run --group dbt dbt build --target ci

  dbt:docs:
    desc: Generate and serve dbt documentation
    dir: dbt
    cmds:
      - uv run --group dbt dbt docs generate
      - uv run --group dbt dbt docs serve

  # ----- Streamlit dashboard -----
  dashboard:
    desc: Launch the Streamlit analytics dashboard
    cmds:
      - uv run --group dashboard streamlit run dashboard/app.py
